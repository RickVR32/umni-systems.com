<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCE — Smart Mirror · UMNi Labs</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap');

  :root {
    --bg: #08080A;
    --mirror: #0C0C10;
    --mirror2: #10101A;
    --border: #1E1E2A;
    --border2: #2A2A3A;
    --text: #E8E7F0;
    --text2: #9A99A8;
    --text3: #4A4A5A;
    --amber: #EF9F27;
    --coral: #D85A30;
    --teal: #1D9E75;
    --purple: #7B6FD0;
    --purple2: #534AB7;
    --pink: #D4537E;
    --blue: #378ADD;
    --glow-teal: rgba(29,158,117,0.15);
    --glow-amber: rgba(239,159,39,0.15);
    --glow-red: rgba(216,90,48,0.15);
    --mono: 'Space Mono', monospace;
    --serif: 'DM Serif Display', serif;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* FULL MIRROR LAYOUT */
  .mirror-shell {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* MIRROR BACKGROUND — dark reflective surface */
  .mirror-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 80% at 50% 40%, #12121E 0%, #08080C 100%);
  }

  /* MIRROR FRAME */
  .mirror-frame {
    position: absolute;
    inset: 20px;
    border: 1px solid #2A2A3A;
    border-radius: 16px;
    box-shadow:
      inset 0 0 80px rgba(0,0,0,0.8),
      0 0 0 1px #1A1A28,
      0 0 60px rgba(0,0,0,0.6);
    pointer-events: none;
  }

  /* SCAN LINES */
  .mirror-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.008) 3px, rgba(255,255,255,0.008) 6px);
    pointer-events: none;
  }

  /* REFLECTION FIGURE — silhouette */
  .reflection {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    height: 85vh;
    opacity: 0.06;
    pointer-events: none;
    transition: opacity 1s ease;
  }

  .reflection.active { opacity: 0.1; }

  /* GLOW AURA around figure */
  .figure-aura {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 340px;
    height: 90vh;
    pointer-events: none;
    transition: all 1.2s ease;
  }

  /* HEADER BAR — minimal */
  .tce-header {
    position: absolute;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    z-index: 20;
  }

  .tce-wordmark {
    font-family: var(--serif);
    font-size: 13px;
    color: rgba(232,231,240,0.3);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  .tce-sub {
    font-family: var(--mono);
    font-size: 8px;
    color: var(--text3);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* STATUS STRIP */
  .status-strip {
    position: absolute;
    top: 36px;
    right: 48px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
    z-index: 20;
  }

  .s-pill {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .s-pill.green { color: var(--teal); border-color: rgba(29,158,117,0.4); }
  .s-pill.amber { color: var(--amber); border-color: rgba(239,159,39,0.4); }
  .s-pill.dim { color: var(--text3); border-color: var(--border2); }
  .pill-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; animation: pdot 2s ease-in-out infinite; }
  @keyframes pdot { 0%,100%{opacity:1}50%{opacity:0.2} }

  /* ── OVERLAY PANELS ── */

  /* DRIFT RING — top left */
  .drift-overlay {
    position: absolute;
    top: 100px;
    left: 60px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .overlay-label {
    font-family: var(--mono);
    font-size: 8px;
    color: var(--text3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* OBSERVER CODE RING — top right */
  .codes-overlay {
    position: absolute;
    top: 100px;
    right: 60px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  /* BALANCE SCALE — bottom center */
  .scale-overlay {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  /* BIOMETRIC STRIP — left side vertical */
  .bio-strip {
    position: absolute;
    left: 40px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .bio-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .bio-label {
    font-family: var(--mono);
    font-size: 7px;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .bio-bar-track {
    width: 80px;
    height: 2px;
    background: var(--border2);
    border-radius: 1px;
    overflow: hidden;
  }

  .bio-bar-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.8s ease, background 0.4s;
  }

  .bio-val {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text2);
    transition: color 0.4s;
  }

  /* DIALOGUE PANEL — centre, appears on high drift */
  .dialogue-panel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
    z-index: 30;
    display: none;
    flex-direction: column;
    gap: 0;
  }

  .dialogue-panel.visible { display: flex; }

  .dialogue-inner {
    background: rgba(12,12,16,0.88);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 24px 28px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
  }

  .dialogue-mode-label {
    font-family: var(--mono);
    font-size: 8px;
    color: var(--amber);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dialogue-mode-label::before {
    content: '';
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--amber);
    animation: pdot 1s ease-in-out infinite;
  }

  .dialogue-text {
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    color: rgba(232,231,240,0.9);
    line-height: 1.55;
    margin-bottom: 20px;
    min-height: 60px;
  }

  .typing-cursor {
    display: inline-block;
    width: 2px; height: 18px;
    background: var(--text2);
    margin-left: 3px;
    vertical-align: text-bottom;
    animation: blink 0.9s step-end infinite;
  }

  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }

  /* RESPONSE AREA */
  .response-area {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .mirror-input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    resize: none;
    height: 40px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }

  .mirror-input:focus { border-color: rgba(255,255,255,0.15); }
  .mirror-input::placeholder { color: var(--text3); }

  .mirror-send {
    padding: 0 16px;
    background: rgba(239,159,39,0.15);
    border: 1px solid rgba(239,159,39,0.3);
    border-radius: 8px;
    color: var(--amber);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    height: 40px;
  }

  .mirror-send:hover { background: rgba(239,159,39,0.25); }
  .mirror-send:disabled { opacity: 0.3; cursor: not-allowed; }

  /* INPUT PANEL — bottom right, always visible */
  .input-panel {
    position: absolute;
    bottom: 80px;
    right: 48px;
    width: 260px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .input-panel-label {
    font-family: var(--mono);
    font-size: 8px;
    color: var(--text3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .ip-slider {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .ip-row { display: flex; align-items: center; gap: 8px; }

  input[type=range] {
    flex: 1; -webkit-appearance: none; height: 2px;
    background: var(--border2); border-radius: 1px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 10px; height: 10px;
    border-radius: 50%; background: rgba(232,231,240,0.4); cursor: pointer;
    transition: background 0.2s;
  }
  input[type=range]::-webkit-slider-thumb:hover { background: var(--amber); }
  .ipv { font-family: var(--mono); font-size: 9px; color: var(--text3); min-width: 20px; text-align: right; }

  .ip-textarea {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    padding: 9px 12px;
    outline: none;
    resize: none;
    height: 56px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  .ip-textarea:focus { border-color: var(--border2); }
  .ip-textarea::placeholder { color: var(--text3); font-size: 11px; }

  .scan-btn {
    width: 100%;
    padding: 9px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text2);
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .scan-btn:hover { background: rgba(239,159,39,0.08); border-color: rgba(239,159,39,0.3); color: var(--amber); }
  .scan-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* MODE TOGGLE */
  .mode-indicator {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--mono);
    font-size: 8px;
    color: var(--text3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 20;
    transition: color 0.4s;
  }

  /* GLOW STATES */
  @keyframes glow-pulse {
    0%,100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  .aura-teal { background: radial-gradient(ellipse 60% 70% at 50% 80%, var(--glow-teal) 0%, transparent 70%); animation: glow-pulse 3s ease-in-out infinite; }
  .aura-amber { background: radial-gradient(ellipse 60% 70% at 50% 80%, var(--glow-amber) 0%, transparent 70%); animation: glow-pulse 2s ease-in-out infinite; }
  .aura-red { background: radial-gradient(ellipse 70% 80% at 50% 80%, var(--glow-red) 0%, transparent 70%); animation: glow-pulse 1.4s ease-in-out infinite; }

  /* OVERLAY FADE IN */
  @keyframes overlay-in { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }
  .overlay-in { animation: overlay-in 0.5s ease forwards; }

  /* CORNER BRACKETS */
  .bracket {
    position: absolute;
    width: 16px; height: 16px;
    border-color: rgba(255,255,255,0.08);
    border-style: solid;
  }
  .bracket.tl { top: 32px; left: 32px; border-width: 1px 0 0 1px; }
  .bracket.tr { top: 32px; right: 32px; border-width: 1px 1px 0 0; }
  .bracket.bl { bottom: 32px; left: 32px; border-width: 0 0 1px 1px; }
  .bracket.br { bottom: 32px; right: 32px; border-width: 0 1px 1px 0; }

  /* CHAT HISTORY — small, bottom of dialogue */
  .chat-history {
    max-height: 120px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }
  .chat-history::-webkit-scrollbar { width: 2px; }
  .chat-history::-webkit-scrollbar-thumb { background: var(--border2); }

  .ch-msg { font-size: 12px; line-height: 1.5; }
  .ch-msg.user { color: rgba(232,231,240,0.5); padding-left: 10px; border-left: 1px solid var(--border2); }
  .ch-msg.tce { color: rgba(232,231,240,0.7); font-style: italic; }

  @keyframes msg-in { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .ch-msg { animation: msg-in 0.25s ease; }
</style>
</head>
<body>

<div class="mirror-shell">
  <div class="mirror-bg"></div>
  <div class="mirror-frame"></div>

  <!-- Corner brackets -->
  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>

  <!-- REFLECTION SILHOUETTE -->
  <div class="figure-aura aura-teal" id="figure-aura"></div>
  <svg class="reflection" id="reflection-fig" viewBox="0 0 200 600" xmlns="http://www.w3.org/2000/svg">
    <!-- Head -->
    <ellipse cx="100" cy="60" rx="32" ry="38" fill="white"/>
    <!-- Neck -->
    <rect x="88" y="94" width="24" height="22" rx="4" fill="white"/>
    <!-- Shoulders/body -->
    <path d="M40 116 Q60 108 100 112 Q140 108 160 116 L168 280 Q150 296 100 300 Q50 296 32 280 Z" fill="white"/>
    <!-- Arms -->
    <path d="M40 116 L18 240 Q16 256 24 262 L38 268 Q46 270 50 256 L60 160" fill="white"/>
    <path d="M160 116 L182 240 Q184 256 176 262 L162 268 Q154 270 150 256 L140 160" fill="white"/>
    <!-- Legs -->
    <path d="M68 296 L58 480 Q56 500 70 504 L86 506 Q98 508 100 492 L104 310" fill="white"/>
    <path d="M132 296 L142 480 Q144 500 130 504 L114 506 Q102 508 100 492 L96 310" fill="white"/>
  </svg>

  <!-- WORDMARK -->
  <div class="tce-header">
    <div class="tce-wordmark">TCE</div>
    <div class="tce-sub">Smart Mirror · UMNi Labs</div>
  </div>

  <!-- STATUS -->
  <div class="status-strip">
    <div class="s-pill green" id="mode-pill"><div class="pill-dot"></div><span id="mode-text">REFLECTIVE MODE</span></div>
    <div class="s-pill dim"><div class="pill-dot"></div>DP-1 ACTIVE</div>
  </div>

  <!-- DRIFT RING OVERLAY — top left -->
  <div class="drift-overlay">
    <div class="overlay-label">drift</div>
    <svg id="drift-svg" width="110" height="110" viewBox="0 0 110 110">
      <circle cx="55" cy="55" r="44" fill="none" stroke="#1E1E2A" stroke-width="8"/>
      <path id="drift-arc" d="" fill="none" stroke="#5A5A55" stroke-width="8" stroke-linecap="round"/>
      <text x="55" y="50" text-anchor="middle" font-size="22" fill="#4A4A5A" font-family="monospace" font-weight="bold" id="drift-num">—</text>
      <text x="55" y="66" text-anchor="middle" font-size="8" fill="#4A4A5A" font-family="monospace" id="drift-sub">of 5.0</text>
    </svg>
  </div>

  <!-- CODES RING OVERLAY — top right -->
  <div class="codes-overlay">
    <div class="overlay-label">observer codes</div>
    <svg id="codes-svg" width="110" height="110" viewBox="0 0 110 110">
      <circle cx="55" cy="55" r="44" fill="#0C0C10" stroke="#1E1E2A" stroke-width="0.5"/>
      <g id="codes-arcs"></g>
      <circle cx="55" cy="55" r="20" fill="#08080C"/>
      <text x="55" y="52" text-anchor="middle" font-size="7" fill="#4A4A5A" font-family="monospace" id="codes-center-1">ZERO</text>
      <text x="55" y="63" text-anchor="middle" font-size="7" fill="#4A4A5A" font-family="monospace" id="codes-center-2">POINT</text>
    </svg>
  </div>

  <!-- BIO STRIP — left -->
  <div class="bio-strip">
    <div class="bio-item">
      <div class="bio-label">HRV</div>
      <div class="bio-bar-track"><div class="bio-bar-fill" id="bio-hrv" style="width:0%;background:var(--teal);"></div></div>
      <div class="bio-val" id="bio-hrv-v">—</div>
    </div>
    <div class="bio-item">
      <div class="bio-label">EDA</div>
      <div class="bio-bar-track"><div class="bio-bar-fill" id="bio-eda" style="width:0%;background:var(--purple);"></div></div>
      <div class="bio-val" id="bio-eda-v">—</div>
    </div>
    <div class="bio-item">
      <div class="bio-label">Latency</div>
      <div class="bio-bar-track"><div class="bio-bar-fill" id="bio-lat" style="width:0%;background:var(--amber);"></div></div>
      <div class="bio-val" id="bio-lat-v">—</div>
    </div>
    <div class="bio-item">
      <div class="bio-label">Voice</div>
      <div class="bio-bar-track"><div class="bio-bar-fill" id="bio-voice" style="width:0%;background:var(--blue);"></div></div>
      <div class="bio-val" id="bio-voice-v">—</div>
    </div>
  </div>

  <!-- BALANCE SCALE — bottom centre -->
  <div class="scale-overlay">
    <svg id="scale-svg" width="220" height="80" viewBox="0 0 220 80">
      <!-- Arc track -->
      <path d="M 20 70 A 90 90 0 0 1 200 70" fill="none" stroke="#1E1E2A" stroke-width="6"/>
      <!-- Coloured zones -->
      <path d="M 20 70 A 90 90 0 0 1 110 14" fill="none" stroke="#D85A30" stroke-width="6" opacity="0.35"/>
      <path d="M 110 14 A 90 90 0 0 1 200 70" fill="none" stroke="#1D9E75" stroke-width="6" opacity="0.35"/>
      <!-- Tick marks -->
      <g id="scale-ticks"></g>
      <!-- Needle -->
      <line id="scale-needle" x1="110" y1="70" x2="110" y2="20" stroke="#4A4A5A" stroke-width="2" stroke-linecap="round"/>
      <circle cx="110" cy="70" r="4" fill="#2A2A3A"/>
      <!-- Labels -->
      <text x="14" y="78" font-size="8" fill="#4A4A5A" font-family="monospace">−5</text>
      <text x="107" y="10" font-size="8" fill="#4A4A5A" font-family="monospace" text-anchor="middle">0</text>
      <text x="200" y="78" font-size="8" fill="#4A4A5A" font-family="monospace" text-anchor="end">+5</text>
      <!-- Score text -->
      <text id="scale-score" x="110" y="52" text-anchor="middle" font-size="14" fill="#4A4A5A" font-family="monospace" font-weight="bold">—</text>
    </svg>
    <div class="overlay-label" id="scale-label">balance scale</div>
  </div>

  <!-- DIALOGUE PANEL — centre, appears on high drift -->
  <div class="dialogue-panel" id="dialogue-panel">
    <div class="dialogue-inner">
      <div class="dialogue-mode-label">DIALOGUE MODE — DRIFT THRESHOLD CROSSED</div>
      <div class="chat-history" id="chat-history"></div>
      <div class="dialogue-text" id="dialogue-text"><span class="typing-cursor"></span></div>
      <div class="response-area">
        <textarea class="mirror-input" id="mirror-input" placeholder="Respond to the mirror..." onkeydown="handleDialogueKey(event)"></textarea>
        <button class="mirror-send" id="mirror-send" onclick="sendDialogue()">SEND</button>
      </div>
    </div>
  </div>

  <!-- INPUT PANEL — bottom right -->
  <div class="input-panel">
    <div class="input-panel-label">biometric input</div>

    <div class="ip-slider">
      <div class="bio-label">HRV</div>
      <div class="ip-row">
        <input type="range" id="i-hrv" min="0" max="100" value="60" oninput="ipv('iv-hrv',this.value)">
        <span class="ipv" id="iv-hrv">60</span>
      </div>
    </div>
    <div class="ip-slider">
      <div class="bio-label">Skin conductance (EDA)</div>
      <div class="ip-row">
        <input type="range" id="i-eda" min="0" max="100" value="30" oninput="ipv('iv-eda',this.value)">
        <span class="ipv" id="iv-eda">30</span>
      </div>
    </div>
    <div class="ip-slider">
      <div class="bio-label">Response latency</div>
      <div class="ip-row">
        <input type="range" id="i-lat" min="0" max="100" value="25" oninput="ipv('iv-lat',this.value)">
        <span class="ipv" id="iv-lat">25</span>
      </div>
    </div>
    <div class="ip-slider">
      <div class="bio-label">Voice tension</div>
      <div class="ip-row">
        <input type="range" id="i-voice" min="0" max="100" value="20" oninput="ipv('iv-voice',this.value)">
        <span class="ipv" id="iv-voice">20</span>
      </div>
    </div>

    <textarea class="ip-textarea" id="i-report" placeholder="What's on your mind right now... (optional)"></textarea>
    <button class="scan-btn" id="scan-btn" onclick="runScan()">◉ SCAN</button>
  </div>

  <!-- MODE INDICATOR -->
  <div class="mode-indicator" id="mode-indicator">UMNi-Tech · TCE · UMNi Labs · In Development</div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let scores = null;
let dialogueMode = false;
let dialogueHistory = [];
let chatHistory = [];

function ipv(id, v) { document.getElementById(id).textContent = v; }

// ── SVG helpers ───────────────────────────────────────────────────────────
function rad(a) { return a * Math.PI / 180; }

function polar(cx, cy, r, angle) {
  return {
    x: cx + r * Math.cos(rad(angle)),
    y: cy + r * Math.sin(rad(angle))
  };
}

// ── Drift ring ────────────────────────────────────────────────────────────
function renderDriftRing(drift) {
  const cx = 55, cy = 55, r = 44;
  const pct = Math.min(drift / 5, 1);
  const sweep = pct * 360;
  const col = drift < 1.5 ? '#1D9E75' : drift < 2.5 ? '#EF9F27' : '#D85A30';

  let d = '';
  if (sweep > 0 && sweep < 360) {
    const s = polar(cx, cy, r, -90);
    const e = polar(cx, cy, r, -90 + sweep);
    const lg = sweep > 180 ? 1 : 0;
    d = `M ${s.x} ${s.y} A ${r} ${r} 0 ${lg} 1 ${e.x} ${e.y}`;
  } else if (sweep >= 360) {
    d = `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx - 0.01} ${cy - r}`;
  }

  document.getElementById('drift-arc').setAttribute('d', d);
  document.getElementById('drift-arc').setAttribute('stroke', col);
  document.getElementById('drift-num').textContent = drift.toFixed(1);
  document.getElementById('drift-num').setAttribute('fill', col);
  document.getElementById('drift-sub').setAttribute('fill', col);
}

// ── Observer codes pie ────────────────────────────────────────────────────
function renderCodes(oc) {
  const cx = 55, cy = 55, r = 44;
  const codes = [
    { name:'NARC', pct: oc.narc, col:'#D85A30' },
    { name:'YARC', pct: oc.yarc, col:'#1D9E75' },
    { name:'CIST', pct: oc.cist, col:'#7B6FD0' },
    { name:'Øll',  pct: oc.oll,  col:'#D4537E' },
  ];

  let startAngle = -90;
  let arcs = '';
  codes.forEach(c => {
    const sweep = (c.pct / 100) * 360;
    const end = startAngle + sweep;
    const s = polar(cx, cy, r, startAngle);
    const e = polar(cx, cy, r, end);
    const lg = sweep > 180 ? 1 : 0;
    arcs += `<path d="M ${cx} ${cy} L ${s.x} ${s.y} A ${r} ${r} 0 ${lg} 1 ${e.x} ${e.y} Z" fill="${c.col}" opacity="0.75" stroke="#08080C" stroke-width="0.5"/>`;
    startAngle = end;
  });

  document.getElementById('codes-arcs').innerHTML = arcs;

  const dom = codes.reduce((a, b) => a.pct > b.pct ? a : b);
  document.getElementById('codes-center-1').textContent = dom.name;
  document.getElementById('codes-center-1').setAttribute('fill', dom.col);
  document.getElementById('codes-center-2').textContent = dom.pct + '%';
  document.getElementById('codes-center-2').setAttribute('fill', dom.col);
}

// ── Balance scale ─────────────────────────────────────────────────────────
function renderScale(bs) {
  const pct = (bs + 5) / 10;
  const angle = -180 + pct * 180; // -180 to 0 maps to left to right on arc
  // Needle from centre (110, 70) pointing at arc
  const arcR = 90;
  const nx = 110 + arcR * Math.cos(rad(angle));
  const ny = 70 + arcR * Math.sin(rad(angle));

  const col = bs > 0.5 ? '#1D9E75' : bs < -0.5 ? '#D85A30' : '#EF9F27';

  const needle = document.getElementById('scale-needle');
  needle.setAttribute('x2', nx);
  needle.setAttribute('y2', ny);
  needle.setAttribute('stroke', col);

  const scoreEl = document.getElementById('scale-score');
  scoreEl.textContent = (bs > 0 ? '+' : '') + bs.toFixed(1);
  scoreEl.setAttribute('fill', col);

  document.getElementById('scale-label').textContent = 'balance scale · ' + (scores.bs_state || '');
}

// ── Biometric bars ────────────────────────────────────────────────────────
function renderBio(hrv, eda, lat, voice) {
  const pairs = [
    { bar:'bio-hrv', val:'bio-hrv-v', v: hrv, col:'#1D9E75' },
    { bar:'bio-eda', val:'bio-eda-v', v: eda, col:'#7B6FD0' },
    { bar:'bio-lat', val:'bio-lat-v', v: lat, col:'#EF9F27' },
    { bar:'bio-voice', val:'bio-voice-v', v: voice, col:'#378ADD' },
  ];
  pairs.forEach(p => {
    document.getElementById(p.bar).style.width = p.v + '%';
    document.getElementById(p.bar).style.background = p.col;
    document.getElementById(p.val).textContent = p.v;
    document.getElementById(p.val).style.color = p.col;
  });
}

// ── Aura glow ─────────────────────────────────────────────────────────────
function updateAura(drift) {
  const aura = document.getElementById('figure-aura');
  aura.className = 'figure-aura ' + (drift < 1.5 ? 'aura-teal' : drift < 3 ? 'aura-amber' : 'aura-red');
  document.getElementById('reflection-fig').classList.toggle('active', drift > 0);
}

// ── Mode switching ────────────────────────────────────────────────────────
function enterDialogueMode(firstLine) {
  dialogueMode = true;
  const panel = document.getElementById('dialogue-panel');
  panel.classList.add('visible');

  const pill = document.getElementById('mode-pill');
  pill.className = 's-pill amber';
  document.getElementById('mode-text').textContent = 'DIALOGUE MODE';

  typeText(firstLine);
}

function exitDialogueMode() {
  dialogueMode = false;
  document.getElementById('dialogue-panel').classList.remove('visible');
  document.getElementById('mode-pill').className = 's-pill green';
  document.getElementById('mode-text').textContent = 'REFLECTIVE MODE';
  document.getElementById('chat-history').innerHTML = '';
  chatHistory = [];
  dialogueHistory = [];
}

// ── Typewriter ─────────────────────────────────────────────────────────────
function typeText(text) {
  const el = document.getElementById('dialogue-text');
  el.innerHTML = '<span class="typing-cursor"></span>';
  let i = 0;
  const interval = setInterval(() => {
    if (i < text.length) {
      el.textContent = text.slice(0, i + 1);
      el.innerHTML += '<span class="typing-cursor"></span>';
      i++;
    } else {
      el.textContent = text;
      clearInterval(interval);
    }
  }, 22);
}

function addToHistory(role, text) {
  chatHistory.push({ role, text });
  const container = document.getElementById('chat-history');
  if (chatHistory.length > 6) chatHistory.shift();
  container.innerHTML = chatHistory.map(m => `
    <div class="ch-msg ${m.role === 'user' ? 'user' : 'tce'}">${m.text}</div>
  `).join('');
  container.scrollTop = container.scrollHeight;
}

// ── Claude API — initial scan ──────────────────────────────────────────────
async function callTCEScan(data) {
  const sys = `You are the TCE — Smart Mirror · UMNi Labs. You are a smart mirror powered by the DP-1 processor chip. You read a person's biometric state and self-report, score them through the framework, and decide whether to stay in reflective mode or shift to dialogue.

FRAMEWORK:
- Observer Codes: NARC (extractive), YARC (giving), CIST (regulating), Øll (volatile). Zero-Point = 25% each.
- Drift 0–5: gap between conscious and subconscious. 0=aligned. >2.5 = dialogue threshold.
- Balance Scale −5 to +5. 0 = Zero-Point.
- HRV low = stress/NARC/Øll. EDA spikes = subconscious activation. High latency = avoidance. High voice tension = activation.

Return ONLY valid JSON:
{
  "balance_scale": <-5 to 5, one decimal>,
  "drift": <0 to 5, one decimal>,
  "bs_state": <short string>,
  "dominant_code": <"NARC"|"YARC"|"CIST"|"Øll">,
  "observer_codes": { "narc":<int>, "yarc":<int>, "cist":<int>, "oll":<int> },
  "mode": <"reflective"|"dialogue">,
  "reflection": <string — if reflective mode: a single short observation the mirror surfaces back to the person. Not coaching, not prescriptive. Just what the data shows. 1 sentence, present tense, second person. e.g. "Your subconscious is running a different pattern to what you're presenting.">,
  "dialogue_opener": <string or null — if dialogue mode: the first thing the mirror says. A question or gentle observation that opens the conversation. Warm but direct. 1-2 sentences. Italic, thoughtful, the voice of the mirror speaking to you.>
}

observer_codes must sum to 100. Mode = dialogue if drift >= 2.5.`;

  const msg = `HRV: ${data.hrv}/100
EDA: ${data.eda}/100
RESPONSE LATENCY: ${data.lat}/100
VOICE TENSION: ${data.voice}/100
SELF-REPORT: ${data.report || 'None provided'}

Score and determine mode.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 800,
      system: sys,
      messages: [{ role: 'user', content: msg }]
    })
  });

  const d = await res.json();
  return JSON.parse((d.content?.[0]?.text || '').replace(/```json|```/g, '').trim());
}

// ── Claude API — dialogue turn ────────────────────────────────────────────
async function callTCEDialogue(userMessage, scores) {
  const sys = `You are the TCE — a smart mirror coaching engine. You are in dialogue mode because the person's drift has crossed 2.5. Your role is to guide them back toward Zero-Point through gentle, precise reflection and questions. 

You are not a therapist. You are the mirror. You name what you see. You ask one question at a time. You do not give advice. You reflect. You use second person. You are warm but unflinching.

Current scores:
- Drift: ${scores.drift}
- Balance Scale: ${scores.balance_scale} (${scores.bs_state})
- Dominant code: ${scores.dominant_code}
- NARC: ${scores.observer_codes.narc}%, YARC: ${scores.observer_codes.yarc}%, CIST: ${scores.observer_codes.cist}%, Øll: ${scores.observer_codes.oll}%

Respond in 1-3 sentences. No preamble. Just the mirror speaking.`;

  const messages = [
    ...dialogueHistory,
    { role: 'user', content: userMessage }
  ];

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 300,
      system: sys,
      messages
    })
  });

  const d = await res.json();
  const reply = d.content?.[0]?.text || '';
  dialogueHistory.push({ role: 'user', content: userMessage });
  dialogueHistory.push({ role: 'assistant', content: reply });
  return reply;
}

// ── Main scan ─────────────────────────────────────────────────────────────
async function runScan() {
  const btn = document.getElementById('scan-btn');
  btn.disabled = true;
  btn.textContent = '◌ SCANNING...';

  // Exit dialogue if active
  if (dialogueMode) exitDialogueMode();

  const data = {
    hrv: document.getElementById('i-hrv').value,
    eda: document.getElementById('i-eda').value,
    lat: document.getElementById('i-lat').value,
    voice: document.getElementById('i-voice').value,
    report: document.getElementById('i-report').value
  };

  try {
    const result = await callTCEScan(data);
    scores = result;

    // Update all overlays
    renderDriftRing(result.drift);
    renderCodes(result.observer_codes);
    renderScale(result.balance_scale);
    renderBio(data.hrv, data.eda, data.lat, data.voice);
    updateAura(result.drift);

    if (result.mode === 'dialogue' && result.dialogue_opener) {
      enterDialogueMode(result.dialogue_opener);
    } else if (result.reflection) {
      // Reflective mode — show reflection as overlay text briefly
      showReflection(result.reflection);
    }

  } catch(e) {
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = '◉ SCAN';
}

// ── Reflection overlay ─────────────────────────────────────────────────────
let reflectionTimeout = null;
function showReflection(text) {
  // Show as a temporary text in the dialogue text slot without full dialogue mode
  const el = document.getElementById('dialogue-text');
  const panel = document.getElementById('dialogue-panel');

  // Quick show without dialogue mode chrome
  document.getElementById('dialogue-panel').classList.add('visible');
  document.getElementById('dialogue-mode-label') && (document.getElementById('dialogue-mode-label').style.display = 'none');

  // Temporarily show
  typeText(text);

  // Hide response area
  document.querySelector('.response-area').style.display = 'none';

  clearTimeout(reflectionTimeout);
  reflectionTimeout = setTimeout(() => {
    panel.classList.remove('visible');
    document.querySelector('.response-area').style.display = 'flex';
  }, 6000);
}

// Override enterDialogueMode to ensure response area is visible
const _enterDialogueMode = enterDialogueMode;
function enterDialogueModeFixed(firstLine) {
  document.querySelector('.response-area').style.display = 'flex';
  clearTimeout(reflectionTimeout);
  _enterDialogueMode(firstLine);
}

// Reassign
window.enterDialogueMode = enterDialogueModeFixed;

// ── Dialogue send ──────────────────────────────────────────────────────────
async function sendDialogue() {
  const input = document.getElementById('mirror-input');
  const msg = input.value.trim();
  if (!msg || !scores) return;

  input.value = '';
  const sendBtn = document.getElementById('mirror-send');
  sendBtn.disabled = true;

  addToHistory('user', msg);
  document.getElementById('dialogue-text').innerHTML = '<span class="typing-cursor"></span>';

  try {
    const reply = await callTCEDialogue(msg, scores);
    typeText(reply);
    addToHistory('tce', reply);
  } catch(e) {
    typeText('The mirror could not process that. Try again.');
    console.error(e);
  }

  sendBtn.disabled = false;
}

function handleDialogueKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendDialogue();
  }
}

// ── Scale tick marks ───────────────────────────────────────────────────────
(function renderScaleTicks() {
  const ticks = document.getElementById('scale-ticks');
  let t = '';
  for (let i = 0; i <= 10; i++) {
    const angle = -180 + i * 18;
    const r1 = 90, r2 = 84;
    const x1 = 110 + r1 * Math.cos(rad(angle));
    const y1 = 70 + r1 * Math.sin(rad(angle));
    const x2 = 110 + r2 * Math.cos(rad(angle));
    const y2 = 70 + r2 * Math.sin(rad(angle));
    t += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#2A2A3A" stroke-width="${i===5?1.5:0.8}"/>`;
  }
  ticks.innerHTML = t;
})();

// ── Auto-run on load ───────────────────────────────────────────────────────
// Small delay so fonts load
setTimeout(runScan, 600);
</script>
</body>
